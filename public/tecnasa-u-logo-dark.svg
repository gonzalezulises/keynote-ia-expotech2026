<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <!-- Pixelated U icon -->
  <g fill="#37B8EC">
    <!-- Top-left pixel cluster -->
    <rect x="0" y="0" width="12" height="12" rx="1"/>
    <rect x="15" y="0" width="12" height="12" rx="1"/>
    <rect x="0" y="15" width="12" height="12" rx="1"/>
    <rect x="15" y="15" width="12" height="12" rx="1"/>
    <rect x="30" y="15" width="12" height="12" rx="1"/>
    <!-- Left vertical bar -->
    <rect x="30" y="30" width="12" height="12" rx="1"/>
    <rect x="30" y="45" width="12" height="12" rx="1"/>
    <rect x="30" y="60" width="12" height="12" rx="1"/>
    <!-- Bottom curve -->
    <rect x="30" y="75" width="12" height="12" rx="1"/>
    <rect x="45" y="75" width="12" height="12" rx="1"/>
    <rect x="60" y="75" width="12" height="12" rx="1"/>
    <!-- Right vertical bar -->
    <rect x="60" y="15" width="12" height="12" rx="1"/>
    <rect x="60" y="30" width="12" height="12" rx="1"/>
    <rect x="60" y="45" width="12" height="12" rx="1"/>
    <rect x="60" y="60" width="12" height="12" rx="1"/>
  </g>
  <!-- "tecnasa" text — white for dark backgrounds -->
  <text x="90" y="58" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="46" fill="#FFFFFF" letter-spacing="-1">tecnasa</text>
  <!-- "u" in accent blue -->
  <text x="310" y="58" font-family="Inter, system-ui, sans-serif" font-weight="800" font-size="46" fill="#37B8EC" letter-spacing="-1">u</text>
  <!-- "LEARNING CENTERS" subtitle -->
  <text x="92" y="82" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="16" fill="#A1A1AA" letter-spacing="5">LEARNING CENTERS</text>
</svg>
